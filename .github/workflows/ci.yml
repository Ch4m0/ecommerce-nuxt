name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Install, Type Check & Build
    runs-on: ubuntu-latest
    env:
      NUXT_PUBLIC_API_BASE_URL: https://fakestoreapi.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm install

      - name: Type check
        run: npx nuxi typecheck

      - name: Build
        run: npm run build

  deploy:
    name: Deploy (Simulated)
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Simulate deploy
        run: echo "Deploying commit ${{ github.sha }} to production..."
